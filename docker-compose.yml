services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: omni_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "25432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./services/shared/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ibgateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: omni_ibgateway
    restart: always
    environment:
      TWS_USERID: ${IB_USER}
      TWS_PASSWORD: ${IB_PASSWORD}
      TRADING_MODE: ${IB_TRADING_MODE}
      READ_ONLY_API: "no"
      VNC_SERVER_PASSWORD: ${IB_VNC_PASSWORD}
      EXISTING_SESSION_DETECTED_ACTION: "primary"
      ACCEPT_INCOMING_CONNECTION: "accept"
      BYPASS_WARNING: "yes"
      IBC_OverrideTwsApiPort: "24004"
      IBC_TrustedIPs: "172.0.0.0/8,127.0.0.1"
      IBC_ApiOnly: "true"
    ports:
      - "24004:24004"
      - "25900:5900"

  ingester:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: omni_ingester
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVICE_NAME: data_ingester
      DB_HOST: db
      DB_PORT: "25432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY}
      IB_HOST: ibgateway
      IB_PORT: "24004"
      IB_CLIENT_ID: "10"
      IBKR_SYMBOLS: ${IBKR_SYMBOLS}
      CRYPTO_SYMBOLS: ${CRYPTO_SYMBOLS}
      RF_TRAIN_YEARS: ${RF_TRAIN_YEARS}
    mem_limit: 512m

  brain:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: omni_brain
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVICE_NAME: ai_brain
      DB_HOST: db
      DB_PORT: "25432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      INITIAL_CAPITAL_US: ${INITIAL_CAPITAL_US}
      IBKR_SYMBOLS: ${IBKR_SYMBOLS}
      RF_TRAIN_YEARS: ${RF_TRAIN_YEARS}
      BRAIN_LOOP_INTERVAL: ${BRAIN_LOOP_INTERVAL}
      PPO_CONFIDENCE_MIN: ${PPO_CONFIDENCE_MIN}
      SENTIMENT_QUERY: ${SENTIMENT_QUERY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      RISK_PCT_PER_TRADE: ${RISK_PCT_PER_TRADE}
      USE_FRACTIONAL_SHARES: ${USE_FRACTIONAL_SHARES}
    volumes:
      - rf_models:/tmp
    mem_limit: 1g

  router:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: omni_router
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVICE_NAME: order_router
      DB_HOST: db
      DB_PORT: "25432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      IB_HOST: ibgateway
      IB_PORT: "24004"
      IB_CLIENT_ID: "1"
      IBKR_ACCOUNT_ID: ${IBKR_ACCOUNT_ID}
      IBKR_COMMISSION_PER_SHARE: ${IBKR_COMMISSION_PER_SHARE}
      IBKR_COMMISSION_MIN: ${IBKR_COMMISSION_MIN}
      INITIAL_CAPITAL_US: ${INITIAL_CAPITAL_US}
      RISK_PCT_PER_TRADE: ${RISK_PCT_PER_TRADE}
      USE_FRACTIONAL_SHARES: ${USE_FRACTIONAL_SHARES}
    ports:
      - "28000:28000"
    mem_limit: 700m

  notifier:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: omni_notifier
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVICE_NAME: notifier
      DB_HOST: db
      DB_PORT: "25432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      CHAT_ID: ${CHAT_ID}
      TOPIC_EUA: ${TOPIC_EUA}
      TOPIC_CRIPTO: ${TOPIC_CRIPTO}
      TOPIC_LOGS: ${TOPIC_LOGS}
      INITIAL_CAPITAL_US: ${INITIAL_CAPITAL_US}
    mem_limit: 400m

  watchdog:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: omni_watchdog
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVICE_NAME: watchdog
      DB_HOST: db
      DB_PORT: "25432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      CHAT_ID: ${CHAT_ID}
      TOPIC_LOGS: ${TOPIC_LOGS}
    mem_limit: 200m

volumes:
  db_data:
  rf_models:
